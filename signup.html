<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TextSense — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:#0f1117;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  color:#c9cde0;
  overflow-x:hidden;
}

/* Background glow */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 600px 500px at 20% 30%, rgba(99,102,241,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 500px 400px at 80% 70%, rgba(139,92,246,0.07) 0%, transparent 70%);
  pointer-events:none;
}

/* NAV */
nav{
  height:60px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 80px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  background:rgba(15,17,23,0.8);
  -webkit-backdrop-filter:blur(12px);
  backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:50;
  animation:fadeDown .5s ease both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none;}
.brand-icon{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;font-size:14px;
}
.brand-name{font-size:16px;font-weight:700;color:#fff;}
.nav-right{display:flex;align-items:center;gap:8px;}
.nav-link{
  padding:7px 16px;border-radius:8px;
  font-size:14px;font-weight:500;color:#7b80a0;
  text-decoration:none;transition:color .15s;
}
.nav-link:hover{color:#fff;}
.nav-btn{
  padding:7px 18px;border-radius:8px;
  font-size:14px;font-weight:600;color:#fff;
  text-decoration:none;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  transition:opacity .15s,box-shadow .2s;
  box-shadow:0 4px 14px rgba(99,102,241,0.25);
}
.nav-btn:hover{opacity:.88;box-shadow:0 6px 20px rgba(99,102,241,0.35);}

/* HERO */
.hero{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  padding:80px 40px;
  gap:80px;
  max-width:1100px;
  margin:0 auto;
  width:100%;
}
.hero-left{
  flex:1;
  animation:slideRight .7s .1s cubic-bezier(.16,1,.3,1) both;
}
@keyframes slideRight{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:translateX(0);}}
h1{
  font-size:54px;font-weight:700;line-height:1.08;
  letter-spacing:-2px;color:#fff;margin-bottom:18px;
}
h1 em{
  font-style:normal;
  background:linear-gradient(135deg,#818cf8,#c084fc);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  color:transparent;
}
.hero-sub{font-size:17px;color:#6b7090;line-height:1.6;max-width:380px;}

/* FORM */
.form-box{
  width:400px;flex-shrink:0;
  background:#161a25;
  border:1px solid rgba(255,255,255,0.07);
  border-radius:18px;padding:38px;
  box-shadow:0 24px 60px rgba(0,0,0,0.4);
  animation:slideLeft .7s .15s cubic-bezier(.16,1,.3,1) both;
}
@keyframes slideLeft{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.form-box h2{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px;letter-spacing:-.3px;}
.form-box p{font-size:13.5px;color:#5b6080;margin-bottom:26px;}

.field{margin-bottom:16px;}
label{display:block;font-size:12.5px;font-weight:600;color:#6b7090;margin-bottom:7px;letter-spacing:.2px;}
input{
  width:100%;padding:12px 14px;
  background:#0c0f1c;
  border:1px solid rgba(255,255,255,0.07);
  border-radius:9px;color:#d0d4e8;
  font-family:'Inter',sans-serif;font-size:14px;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
input:focus{border-color:rgba(99,102,241,.5);box-shadow:0 0 0 3px rgba(99,102,241,.1);}
input::placeholder{color:#252b45;}

.btn{
  width:100%;margin-top:6px;padding:13px;border:none;border-radius:9px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff;font-family:'Inter',sans-serif;font-size:14.5px;font-weight:600;
  cursor:pointer;transition:opacity .15s,transform .15s,box-shadow .2s;
  box-shadow:0 6px 20px rgba(99,102,241,.28);
  position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(rgba(255,255,255,.08),transparent);
  pointer-events:none;
}
.btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 10px 28px rgba(99,102,241,.38);}
.btn:active{transform:scale(.99);}

.sep{display:flex;align-items:center;gap:12px;margin:18px 0;color:#333750;font-size:12.5px;}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.05);}
.foot{text-align:center;font-size:13px;color:#5b6080;}
.foot a{color:#818cf8;text-decoration:none;font-weight:500;}
.foot a:hover{text-decoration:underline;}

/* Floating dots animation */
.dots{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.dot{
  position:absolute;width:3px;height:3px;border-radius:50%;
  background:rgba(99,102,241,.35);
  animation:rise linear infinite;
}
@keyframes rise{
  0%{transform:translateY(100vh);opacity:0;}
  5%{opacity:1;}
  95%{opacity:.6;}
  100%{transform:translateY(-50px);opacity:0;}
}
</style>
</head>
<body>
<div class="dots" id="dots"></div>

<nav>
  <a href="/" class="brand"><div class="brand-icon">🧠</div><span class="brand-name">TextSense</span></a>
  <div class="nav-right">
    <a href="/login" class="nav-link">Sign In</a>
    <a href="/signup" class="nav-btn">Get Started</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-left">
    <h1>Detect<br><em>AI text</em><br>instantly.</h1>
    <p class="hero-sub">Paste any text. Know in seconds if a human or AI wrote it.</p>
  </div>
  <div class="form-box">
    <h2>Create account</h2>
    <p>Free forever. Start detecting now.</p>
    <form method="POST">
      <div class="field"><label>Username</label><input type="text" name="username" placeholder="Your username" required></div>
      <div class="field"><label>Password</label><input type="password" name="password" placeholder="Your password" required></div>
      <button class="btn" type="submit">Create Account →</button>
    </form>
    <div class="sep">or</div>
    <p class="foot">Have an account? <a href="/login">Sign in</a></p>
  </div>
</div>

<script>
const c=document.getElementById('dots');
for(let i=0;i<18;i++){
  const d=document.createElement('div');
  d.className='dot';
  d.style.left=Math.random()*100+'%';
  d.style.animationDuration=(Math.random()*14+8)+'s';
  d.style.animationDelay=(Math.random()*12)+'s';
  d.style.width=d.style.height=(Math.random()*3+2)+'px';
  d.style.opacity=Math.random()*.5+.1;
  c.appendChild(d);
}
</script>
</body>
</html>
