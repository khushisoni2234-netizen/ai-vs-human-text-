<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TextSense</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:#0f1117;
  min-height:100vh;
  display:flex;flex-direction:column;
  color:#c9cde0;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 700px 500px at 80% 10%, rgba(99,102,241,.08) 0%,transparent 65%),
    radial-gradient(ellipse 600px 500px at 15% 90%, rgba(139,92,246,.07) 0%,transparent 65%);
}
header{
  height:60px;display:flex;align-items:center;justify-content:space-between;
  padding:0 72px;
  border-bottom:1px solid rgba(255,255,255,.06);
  background:rgba(15,17,23,.85);
  -webkit-backdrop-filter:blur(14px);
  backdrop-filter:blur(14px);
  position:sticky;top:0;z-index:50;
  animation:fadeDown .5s ease both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none;}
.brand-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;}
.brand-name{font-size:16px;font-weight:700;color:#fff;}
.nav-center{display:flex;align-items:center;gap:4px;}
.tab{padding:7px 18px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:500;color:#5b6080;transition:all .15s;}
.tab:hover{color:#c9cde0;background:rgba(255,255,255,.04);}
.tab.on{color:#a5b4fc;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.14);}
.nav-right{display:flex;align-items:center;gap:10px;}
.online{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;color:#4ade80;}
.o-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.signout{padding:6px 15px;border-radius:8px;font-size:13.5px;font-weight:500;color:#5b6080;text-decoration:none;border:1px solid rgba(255,255,255,.07);transition:all .15s;}
.signout:hover{color:#f87171;border-color:rgba(248,113,113,.2);background:rgba(248,113,113,.05);}

.main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:48px 40px;position:relative;z-index:10;
}
.box{
  width:100%;max-width:680px;
  background:#161a25;border:1px solid rgba(255,255,255,.07);
  border-radius:18px;overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,.4);
  animation:popUp .6s .1s cubic-bezier(.16,1,.3,1) both;
}
@keyframes popUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
.box-head{
  padding:20px 28px;border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;gap:10px;
}
.box-title{font-size:15px;font-weight:600;color:#fff;}
.chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:5px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.18);color:#818cf8;}
.box-body{padding:26px;}
textarea{
  width:100%;background:#0c0f1c;border:1px solid rgba(255,255,255,.07);
  border-radius:10px;padding:16px;color:#d0d4e8;
  font-family:'Inter',sans-serif;font-size:15px;line-height:1.7;
  resize:none;height:200px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
textarea:focus{border-color:rgba(99,102,241,.5);box-shadow:0 0 0 3px rgba(99,102,241,.09);}
textarea::placeholder{color:#1e2240;}
.ta-bar{display:flex;align-items:center;justify-content:space-between;margin-top:14px;}
.char-c{font-size:12.5px;color:#3d4268;}
.btn-run{
  padding:11px 28px;border:none;border-radius:9px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;position:relative;overflow:hidden;
  transition:opacity .15s,transform .15s,box-shadow .2s;
  box-shadow:0 5px 18px rgba(99,102,241,.28);
}
.btn-run::after{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.08),transparent);pointer-events:none;}
.btn-run:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 26px rgba(99,102,241,.38);}
.btn-run:active{transform:scale(.99);}
.result{
  margin-top:18px;padding:18px 22px;border-radius:12px;
  display:flex;align-items:center;gap:14px;
  animation:pop .4s cubic-bezier(.16,1,.3,1);
}
@keyframes pop{from{opacity:0;transform:scale(.97);}to{opacity:1;transform:scale(1);}}
.result.ai  {background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);}
.result.human{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.18);}
.r-icon{font-size:28px;flex-shrink:0;}
.r-label{font-size:17px;font-weight:700;}
.result.ai   .r-label{color:#f87171;}
.result.human .r-label{color:#4ade80;}
.r-note{font-size:12.5px;color:#5b6080;margin-top:3px;}
</style>
</head>
<body>
<header>
  <a href="/" class="brand"><div class="brand-icon">🧠</div><span class="brand-name">TextSense</span></a>
  <div class="nav-center">
    <a href="/index" class="tab on">Detector</a>
    <a href="/history" class="tab">History</a>
  </div>
  <div class="nav-right">
    <div class="online"><div class="o-dot"></div>Online</div>
    <a href="/logout" class="signout">Sign Out</a>
  </div>
</header>

<div class="main">
  <div class="box">
    <div class="box-head">
      <span class="box-title">Text Analyser</span>
      <span class="chip">AI vs Human</span>
    </div>
    <div class="box-body">
      <form action="/detect" method="POST">
        <textarea name="text" placeholder="Paste or type text here…" oninput="document.getElementById('cc').textContent=this.value.length+' chars'">{% if text %}{{ text }}{% endif %}</textarea>
        <div class="ta-bar">
          <span class="char-c" id="cc">0 chars</span>
          <button type="submit" class="btn-run">Analyse →</button>
        </div>
      </form>
      {% if result %}
      <div class="result {% if 'AI' in result %}ai{% else %}human{% endif %}">
        <div class="r-icon">{% if 'AI' in result %}🤖{% else %}🧑{% endif %}</div>
        <div>
          <div class="r-label">{{ result }}</div>
          <div class="r-note">Saved to history.</div>
        </div>
      </div>
      {% endif %}
    </div>
  </div>
</div>
</body>
</html>
