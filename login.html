<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TextSense — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:#0f1117;
  min-height:100vh;
  display:flex;flex-direction:column;
  color:#c9cde0;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 600px 500px at 70% 40%, rgba(99,102,241,0.09) 0%, transparent 70%),
    radial-gradient(ellipse 400px 400px at 20% 70%, rgba(139,92,246,0.07) 0%, transparent 70%);
  pointer-events:none;
}
nav{
  height:60px;display:flex;align-items:center;justify-content:space-between;
  padding:0 80px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  background:rgba(15,17,23,0.8);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:50;
  animation:fadeDown .5s ease both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none;}
.brand-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;}
.brand-name{font-size:16px;font-weight:700;color:#fff;}
.nav-right{display:flex;align-items:center;gap:8px;}
.nav-link{padding:7px 16px;border-radius:8px;font-size:14px;font-weight:500;color:#7b80a0;text-decoration:none;transition:color .15s;}
.nav-link:hover{color:#fff;}
.nav-btn{padding:7px 18px;border-radius:8px;font-size:14px;font-weight:600;color:#fff;text-decoration:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);transition:opacity .15s,box-shadow .2s;box-shadow:0 4px 14px rgba(99,102,241,0.25);}
.nav-btn:hover{opacity:.88;}

/* Centered layout */
.page{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:60px 40px;
}
.form-box{
  width:420px;
  background:#161a25;
  border:1px solid rgba(255,255,255,0.07);
  border-radius:18px;padding:44px;
  box-shadow:0 24px 60px rgba(0,0,0,0.45);
  animation:popUp .6s .1s cubic-bezier(.16,1,.3,1) both;
}
@keyframes popUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.status{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.16);
  border-radius:20px;padding:5px 12px;
  font-size:12.5px;font-weight:500;color:#4ade80;
  margin-bottom:22px;
}
.s-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

h2{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.4px;margin-bottom:6px;}
.sub{font-size:14px;color:#5b6080;margin-bottom:28px;}

.field{margin-bottom:16px;}
label{display:block;font-size:12.5px;font-weight:600;color:#6b7090;margin-bottom:7px;}
input{
  width:100%;padding:12px 14px;
  background:#0c0f1c;border:1px solid rgba(255,255,255,0.07);
  border-radius:9px;color:#d0d4e8;
  font-family:'Inter',sans-serif;font-size:14px;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
input:focus{border-color:rgba(99,102,241,.5);box-shadow:0 0 0 3px rgba(99,102,241,.1);}
input::placeholder{color:#252b45;}

.btn{
  width:100%;margin-top:6px;padding:13px;border:none;border-radius:9px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff;font-family:'Inter',sans-serif;font-size:14.5px;font-weight:600;
  cursor:pointer;transition:opacity .15s,transform .15s,box-shadow .2s;
  box-shadow:0 6px 20px rgba(99,102,241,.28);position:relative;overflow:hidden;
}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.08),transparent);pointer-events:none;}
.btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 10px 28px rgba(99,102,241,.38);}
.btn:active{transform:scale(.99);}

.sep{display:flex;align-items:center;gap:12px;margin:18px 0;color:#333750;font-size:12.5px;}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.05);}
.foot{text-align:center;font-size:13px;color:#5b6080;}
.foot a{color:#818cf8;text-decoration:none;font-weight:500;}
.foot a:hover{text-decoration:underline;}

.dots{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.dot{position:absolute;border-radius:50%;background:rgba(99,102,241,.3);animation:rise linear infinite;}
@keyframes rise{0%{transform:translateY(100vh);opacity:0;}5%{opacity:1;}95%{opacity:.5;}100%{transform:translateY(-50px);opacity:0;}}
</style>
</head>
<body>
<div class="dots" id="dots"></div>

<nav>
  <a href="/" class="brand"><div class="brand-icon">🧠</div><span class="brand-name">TextSense</span></a>
  <div class="nav-right">
    <a href="/signup" class="nav-link">Sign Up</a>
    <a href="/login" class="nav-btn">Sign In</a>
  </div>
</nav>

<div class="page">
  <div class="form-box">
    <div class="status"><div class="s-dot"></div>Model online</div>
    <h2>Welcome back</h2>
    <p class="sub">Sign in to your account.</p>
    <form method="POST">
      <div class="field"><label>Username</label><input type="text" name="username" placeholder="Your username" required></div>
      <div class="field"><label>Password</label><input type="password" name="password" placeholder="Your password" required></div>
      <button class="btn" type="submit">Sign In →</button>
    </form>
    <div class="sep">or</div>
    <p class="foot">No account? <a href="/signup">Create one free</a></p>
  </div>
</div>

<script>
const c=document.getElementById('dots');
for(let i=0;i<18;i++){
  const d=document.createElement('div');d.className='dot';
  d.style.left=Math.random()*100+'%';
  d.style.animationDuration=(Math.random()*14+8)+'s';
  d.style.animationDelay=(Math.random()*12)+'s';
  d.style.width=d.style.height=(Math.random()*3+2)+'px';
  c.appendChild(d);
}
</script>
</body>
</html>
